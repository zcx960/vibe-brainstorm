# Map the Upgrade request header to the Connection value nginx must send
# upstream for a WebSocket handshake. Lives in the http/conf context (outside
# the server block). For normal HTTP requests `$http_upgrade` is empty, yielding
# `Connection: close`; for WS it yields `Connection: upgrade`.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets with SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to the backend service. Critically: disable buffering so that
    # the SSE stream (POST /api/brainstorm/expand) is forwarded chunk-by-chunk.
    location /api/ {
        proxy_pass http://backend:8000/api/;

        # HTTP/1.1 + Upgrade/Connection headers so the WebSocket handshake on
        # /api/ws/... is forwarded upstream. For plain HTTP/SSE requests the
        # map yields `Connection: close`, preserving prior behaviour.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events: stream, do not buffer or cache, keep alive long.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }
}
